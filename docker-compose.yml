version: "3.8"

services:
  inframon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bmic-inframon
    ports:
      - "3000:3000"  # Web UI
      - "3001:3001"  # API proxy (Zabbix, Proxmox)
    environment:
      # Zabbix API configuration
      - ZABBIX_API_URL=${ZABBIX_API_URL}
      - ZABBIX_API_TOKEN=${ZABBIX_API_TOKEN}
      # LLM configuration
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Web UI ports
      - PORT=3000
      - PORT_API=3001
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - ./logs:/app/logs
      - ./state:/app/.pi/state
    networks:
      - bmic-infra
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  bmic-infra:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.100.0/24

# Note: Zabbix polling runs externally on macOS via launchd
# (poll_zabbix.py in ~/git/bmic-proxmox/scripts/infra-monitor/)
# The Docker container provides the web UI and API proxy only.
# Docker network on 10.10.100.0/24 allows direct access to 10.10.x.x infrastructure.
