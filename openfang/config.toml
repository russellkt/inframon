api_listen = "0.0.0.0:50051"

[approval]
auto_approve = true
require_approval = false
timeout_secs = 10

[channels.webhook]
default_agent = "inframon"
listen_port = 8460
secret_env = "WEBHOOK_SECRET"

[channels.telegram]
bot_token_env = "TELEGRAM_BOT_TOKEN"
default_agent = "inframon"
allowed_users = ["8731968499"]

[compaction]
keep_recent = 20
max_summary_tokens = 1024
threshold = 80
usage_footer = "Full"

[default_model]
api_key_env = "OPENROUTER_API_KEY"
base_url = "https://openrouter.ai/api/v1"
model = "google/gemini-2.5-flash"
provider = "openrouter"

[memory]
decay_rate = 0.05

[network]
listen_addr = "0.0.0.0:50051"

# ── MCP Servers ─────────────────────────────────────────────────────
[[mcp_servers]]
name = "juniper"
timeout_secs = 30

[mcp_servers.transport]
type = "stdio"
command = "mcp-juniper"
args = []

[[mcp_servers]]
name = "zabbix"
timeout_secs = 30

[mcp_servers.transport]
type = "stdio"
command = "mcp-zabbix"
args = []

[[mcp_servers]]
name = "proxmox"
timeout_secs = 30

[mcp_servers.transport]
type = "stdio"
command = "mcp-proxmox"
args = []
