"""

[model.fallback]
provider = "openrouter"
model = "google/gemini-2.5-flash"
api_key_env = "OPENROUTER_API_KEY"
base_url = "https://openrouter.ai/api/v1"

[resources]
max_llm_tokens_per_hour = 500000
max_concurrent_tools = 5

[capabilities]
tools = ["file_read", "file_write", "file_list", "shell_exec", "web_fetch", "memory_store", "memory_recall"]
shell = [
    "/usr/local/share/inframon/scripts/*",
    "ssh *",
    "ping *",
    "ak *",
    "infra-notify *",
    "python3 *",
]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
agent_spawn = false
