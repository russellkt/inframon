# OpenFang Agent OS â€” Docker Compose for BMIC Inframon
# Runs alongside existing docker-compose.yml (no disruption)
#
# Usage:
#   docker compose -f docker-compose.openfang.yml up -d
#   docker compose -f docker-compose.openfang.yml logs -f

services:
  inframon:
    build:
      context: .
      dockerfile: Dockerfile.openfang
    container_name: bmic-inframon-openfang
    ports:
      - "4200:50051"   # Dashboard + API (external:internal)
      - "8460:8460"    # Webhook gateway (for Zabbix push alerts)
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ZABBIX_API_URL=${ZABBIX_API_URL}
      - ZABBIX_API_TOKEN=${ZABBIX_API_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=http://10.10.1.149:11434
      - OLLAMA_API_KEY=not-needed
      - OPENFANG_HOME=/data
      - RUST_LOG=info
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - PVE_API_URL=${PVE_API_URL}
      - PVE_API_TOKEN_ID=${PVE_API_TOKEN_ID}
      - PVE_API_TOKEN_SECRET=${PVE_API_TOKEN_SECRET}
      - JUNIPER_USER=${JUNIPER_USER}
      - JUNIPER_PASSWORD=${JUNIPER_PASSWORD}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MATRIX_ACCESS_TOKEN=${MATRIX_ACCESS_TOKEN}
      - MATRIX_HOMESERVER_URL=https://matrix.org
      - NOTIFY_WEBHOOK_URL=${NOTIFY_WEBHOOK_URL}
      - NOTIFY_WEBHOOK_API_KEY=${NOTIFY_WEBHOOK_API_KEY}
      - PBS_INSTANCES=${PBS_INSTANCES}
      - PBS_API_TOKEN_ID=${PBS_API_TOKEN_ID}
      - PBS_API_TOKEN_SECRET=${PBS_API_TOKEN_SECRET}
      - PBS_TS140_TOKEN_SECRET=${PBS_TS140_TOKEN_SECRET}
      - PBS_OFFSITE_TOKEN_SECRET=${PBS_OFFSITE_TOKEN_SECRET}
      - TRUENAS_URL=${TRUENAS_URL}
      - TRUENAS_API_KEY=${TRUENAS_API_KEY}
      - AK_DB_URL=${AK_DB_URL}
      - AK_LLM_URL=${AK_LLM_URL}
      - AK_LLM_MODEL=${AK_LLM_MODEL}
      - AK_LLM_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      # OpenFang config and agents
      - ./openfang/config.toml:/data/config.toml
      - ./openfang/agents:/data/agents:ro
      - ./openfang/scripts:/usr/local/share/inframon/scripts:ro
      - ./skills:/data/skills
      # Persistent data (SQLite DB, memory, sessions)
      - ./openfang/data:/data/data
      - ./openfang/workflows:/data/workflows:ro
      # SSH key for Proxmox/switch access (dedicated key â€” NOT personal keys)
      - ./openfang/ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - ./openfang/ssh/id_ed25519.pub:/root/.ssh/id_ed25519.pub:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:50051/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

